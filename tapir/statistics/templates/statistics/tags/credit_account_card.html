{% load i18n %}
<div class="card mb-2">
    <h5 class="card-header d-flex justify-content-between align-items-center">
        {% translate "Credit account" %}
    </h5>
    <ul class="list-group  list-group-flush">
        <li class="list-group-item">
            <table class="{% tapir_table_classes %}"
                   aria-label="{% translate 'List of credits' %}">
                <thead>
                    <tr>
                        <th>{% translate 'Date' %}</th>
                        <th>{% translate 'Credit amount' %}</th>
                    </tr>
                </thead>
                <tbody>
                    {% for credit in filtered_credits %}
                        <tr>
                            <td>{{ credit.credit_date|date:"d.m.Y H:i" }}</td>
                            <td>{{ credit.credit_amount }}€</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </li>
    </ul>
